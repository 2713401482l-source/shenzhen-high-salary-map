<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>V3 Mobile QA Harness</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #272a2f; font-family: system-ui, sans-serif; }
      main { display: grid; gap: 14px; justify-items: center; }
      p { margin: 0; color: #f5f5f3; font-size: 12px; }
      iframe { width: 390px; height: 844px; margin-bottom: -236px; border: 0; border-radius: 28px; background: white; box-shadow: 0 24px 80px rgba(0,0,0,.34); transform: scale(.72); transform-origin: top center; }
      body[data-scale="1"] { place-items: start center; padding: 24px 0; }
      body[data-scale="1"] iframe { margin-bottom: 0; transform: none; }
    </style>
  </head>
  <body>
    <main><p id="label">390 x 844</p><iframe id="preview" title="V3 mobile preview"></iframe></main>
    <script>
      const params = new URLSearchParams(location.search);
      const route = params.get('route') || 'index.html';
      document.body.dataset.scale = params.get('scale') === '1' ? '1' : '0.72';
      document.querySelector('#preview').src = `/${route}`;
      document.querySelector('#label').textContent = `${route} at 390 x 844`;
    </script>
  </body>
</html>
